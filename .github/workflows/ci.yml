name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build workspace
        run: cargo build --workspace --verbose

      - name: Run unit tests
        run: cargo test --workspace --verbose

      - name: Run example fuzz campaign (expected to find the injected bug)
        # This is expected to exit non-zero: examples/token-contract ships
        # with one intentional bug so CI proves the fuzzer still catches
        # it. A real target's CI job should NOT ignore this exit code.
        run: |
          cargo run --release --bin fuzz_token -p token-contract-fuzz-example || true

      - name: Upload fuzz report artifact
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-report
          path: fuzz_report.json
